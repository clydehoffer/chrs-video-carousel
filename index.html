<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRS Recruiting Videos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f9f7f2; font-family: 'Montserrat', Arial, sans-serif; }

        .carousel { width: 100%; padding: 16px; }

        .track-wrapper {
            overflow: hidden;
            border-radius: 6px;
            width: 100%;
        }

        .track {
            display: flex;
            transition: transform 0.4s ease;
        }

        .slide {
            flex: 0 0 100%;
            width: 100%;
        }

        .slide-label {
            color: #A18528;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            margin-bottom: 8px;
            text-transform: uppercase;
            display: block;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }

        .video-wrap iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }

        .arrow {
            background: transparent;
            border: 1px solid rgba(161,133,40,0.6);
            border-radius: 50%;
            color: #A18528;
            cursor: pointer;
            font-size: 20px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .arrow:hover {
            background: #A18528;
            color: white;
        }

        .arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .hint {
            color: #8A8A8D;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="carousel">
        <div class="track-wrapper">
            <div class="track" id="track">
                <div class="slide">
                    <span class="slide-label">01 — Introducing CHRS Recruiting</span>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/a56oltrlmFI" title="Introducing CHRS Recruiting" allowfullscreen></iframe>
                    </div>
                </div>
                <div class="slide">
                    <span class="slide-label">02 — Getting Started with PageUp</span>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/fodebbvqNgw" title="Getting Started with PageUp" allowfullscreen></iframe>
                    </div>
                </div>
                <div class="slide">
                    <span class="slide-label">03 — PageUp for Existing Users</span>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/QDHTIF89ckU" title="PageUp for Existing Users" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav">
            <button class="arrow" id="prev">&#8592;</button>
            <span class="hint">Swipe Left or Right To View More</span>
            <button class="arrow" id="next">&#8594;</button>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const slides = track.querySelectorAll('.slide');
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');
        let current = 0;

        function goTo(n) {
            current = Math.max(0, Math.min(n, slides.length - 1));
            track.style.transform = 'translateX(-' + (current * 100) + '%)';
            prev.disabled = current === 0;
            next.disabled = current === slides.length - 1;
        }

        prev.addEventListener('click', () => goTo(current - 1));
        next.addEventListener('click', () => goTo(current + 1));

        let startX = 0;
        track.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
        track.addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
        }, { passive: true });

        goTo(0);
    </script>
</body>
</html>
