<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRS Recruiting Videos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: transparent; font-family: 'Montserrat', Arial, sans-serif; overflow: hidden; }

        .carousel { position: relative; width: 100%; }

        .track-wrapper { overflow: hidden; width: 100%; }
        .track { display: flex; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); will-change: transform; }

        .slide { flex: 0 0 100%; width: 100%; }
        .slide-label {
            color: #A18528;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .video-wrap {
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            width: 100%;
        }
        .video-wrap::before {
            content: '';
            display: block;
            padding-bottom: 56.25%;
        }
        .video-wrap iframe {
            border: none;
            height: 100%;
            left: 0;
            position: absolute;
            top: 0;
            width: 100%;
        }

        /* Bottom nav */
        .nav {
            align-items: center;
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 14px;
        }
        .arrow {
            align-items: center;
            background: transparent;
            border: 1px solid rgba(161,133,40,0.5);
            border-radius: 50%;
            color: #A18528;
            cursor: pointer;
            display: flex;
            font-size: 18px;
            height: 34px;
            justify-content: center;
            line-height: 1;
            transition: background 0.2s, color 0.2s;
            width: 34px;
        }
        .arrow:hover { background: #A18528; color: #fff; }
        .arrow:disabled { opacity: 0.25; cursor: default; }
        .hint {
            color: #8A8A8D;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="carousel">
        <div class="track-wrapper">
            <div class="track" id="track">

                <div class="slide">
                    <p class="slide-label">01 — Introducing CHRS Recruiting</p>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/a56oltrlmFI" loading="lazy" title="Introducing CHRS Recruiting" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="slide">
                    <p class="slide-label">02 — Getting Started with PageUp</p>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/fodebbvqNgw" loading="lazy" title="Getting Started with PageUp" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="slide">
                    <p class="slide-label">03 — PageUp for Existing Users</p>
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/QDHTIF89ckU" loading="lazy" title="PageUp for Existing Users" allowfullscreen></iframe>
                    </div>
                </div>

            </div>
        </div>

        <div class="nav">
            <button class="arrow" id="prev" aria-label="Previous video">&#8592;</button>
            <span class="hint">Swipe Left or Right To View More</span>
            <button class="arrow" id="next" aria-label="Next video">&#8594;</button>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const slides = track.querySelectorAll('.slide');
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');
        let current = 0;

        function goTo(index) {
            current = Math.max(0, Math.min(index, slides.length - 1));
            track.style.transform = 'translateX(-' + (current * 100) + '%)';
            prev.disabled = current === 0;
            next.disabled = current === slides.length - 1;
        }

        prev.addEventListener('click', () => goTo(current - 1));
        next.addEventListener('click', () => goTo(current + 1));

        // Touch swipe support
        let startX = 0;
        track.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
        track.addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
        }, { passive: true });

        goTo(0);
    </script>
</body>
</html>
